name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo branch/PR quando há um novo push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # A rota do Mercado Pago é dinâmica e não roda no build, mas o
          # MercadoPagoConfig lê esta variável no carregamento do módulo.
          # Em produção use um secret; aqui um placeholder basta para o build.
          MP_ACC_KEY: ${{ secrets.MP_ACC_KEY || 'ci-placeholder-token' }}
